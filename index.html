<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <div class="hero-left">
            <div class="logo-container">
                <img class="odin-logo" src="./images/odin-lined.png" alt="odin logo">
                ODIN
            </div>
            <p class="credit">Photo by
                <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on
                <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA">Unsplash</a>
            </p>
        </div>
        <div class="hero-right">
            <div class="quote-container">
                <h2>This is not a real online service! You know you need something like this in your life to help you
                    realize your deepest dreams.
                    <br>Sign up <em>now</em> to get started.
                    <br><br> You <em>know</em> you want to.
                </h2>
            </div>
            <div class="form-container">
                <h2>Let's do this!</h2>
                <form action="#" method="post" id="signUp">
                    <div class="full-name">
                        <div class="form-group">
                            <label for="fName">FIRST NAME</label>
                            <input type="text" id="fName" required>
                        </div>

                        <div class="form-group">
                            <label for="lName">LAST NAME</label>
                            <input type="text" id="lName" required>
                        </div>
                    </div>

                    <div class="contact">
                        <div class="form-group">
                            <label for="email">EMAIL</label>
                            <input type="email" id="email" required>
                        </div>

                        <div class="form-group">
                            <label for="phone">PHONE NUMBER</label>
                            <input type="tel" id="phone" required pattern="^\+?[0-9\s\-]{10,15}$"
                                placeholder="+90 555 123 4567">
                        </div>
                    </div>

                    <div class="password">
                        <div class="form-group">
                            <label for="password">PASSWORD</label>
                            <input type="password" minlength="8" id="password" required>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">CONFIRM PASSWORD</label>
                            <input type="password" minlength="8" id="confirmPassword" required>
                        </div>
                    </div>
                </form>
            </div>
            <div class="button-container">
                <button class="createBtn" form="signUp" type="submit">Create Account</button>
                <p>Already have an account? <a href="#">Log in</a></p>
            </div>
        </div>
    </div>
</body>

</html>
